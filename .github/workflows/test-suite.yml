name: execute test suite
permissions:
  contents: read
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  execute_testsuite:
    runs-on: ubuntu-latest
    environment: release-env
    steps:
      - uses: actions/checkout@v6
      - name: Setup build dependencies
        run: make setup
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
      - name: Execute test suite
        run: make clean test
